name: Go Build and Release
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Prepare Version and Names
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=$(git rev-parse --short HEAD)
        fi
        
        PROJECT_NAME="icecast-exporter"
        RELEASE_NAME="${PROJECT_NAME}-${VERSION}"
        
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
        echo "PROJECT_NAME=${PROJECT_NAME}" >> $GITHUB_ENV

    - name: Build and Package
      run: |
        GOOS=linux GOARCH=amd64 go build -v -o "${{ env.PROJECT_NAME }}" .
        mkdir -p "${{ env.RELEASE_NAME }}"
        mv "${{ env.PROJECT_NAME }}" "${{ env.RELEASE_NAME }}/"
        cp README.md LICENSE "${{ env.RELEASE_NAME }}/" || true
        tar -cvzf "${{ env.RELEASE_NAME }}.tar.gz" "${{ env.RELEASE_NAME }}"

    - name: Upload Build Artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.RELEASE_NAME }}
        path: ${{ env.RELEASE_NAME }}.tar.gz
        retention-days: 5

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.RELEASE_NAME }}.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
